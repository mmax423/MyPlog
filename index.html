    content: `作为一个极具感性的人，若从正面说，或许会被人称作有艺术家的潜质，但如若稍消极地说，生活上则是优柔寡断、拧巴与多事。本文期求描绘我眼中，即感性者眼里人与人之间的情感状态，希望以文字达成情感的具象。

本篇叙述有关恋情的内容。

我长期迷恋与他人的亲密关系，不论是朋友还是恋人。当然，其中体现得最淋漓的一定是恋人关系。从一段又一段幼稚却让我心碎的恋情里，我逐渐重构出对亲密关系的新的认知：在身心剧变的青春期与成人期，人与生俱来的与他者产生联动的社会本能，以及巨变环境下对未知产生的不安，很大程度上导致了人对情感陪伴的渴望与依恋。

引发我产生显著感受的事件就是：我的发小近乎疯狂地陷入对亲密关系的执着追求，不分对象，只讨归所，好像如果得不到一个能够“爱”他的第三者（指父母及家庭外的角色）便无法真正立足世界一般。

看着ta成天在交际圈里散播着那塑料一样灿烂，但廉价得让身边人无奈的恋爱泡泡，我看到了一部分自己的影子。我看着ta“对象”的无端迭代，看着象征联结的玩偶一个接一个，看着ta微信里的满屏绿色……泡沫的陡然碎裂让我先他一步惊觉，惊觉身处幻梦，终于呕出了自己。

高三当年我沉没在灰色的世界里，自我地描摹着能“拯救我”的理想角色，迷迷糊糊间撞见一张陌生的面孔，那笔划里的色彩便渲染上这段突发关系，我不由自主地将闪光灯打到ta身上，衬得ta是那么耀眼，这光又将我背后的阴影照得更深了些。我的心里燃起了火，温暖的同时也不断消耗着燃料，我一次次拨通电话，一遍遍拼凑回忆……

我对ta的最初的情感状态经过了自我肯定式的引导，如《社会心理学》中所阐释的原理，我们双方在初期交互的情感经此获得粉刷与绽放，由最初闪耀的灰白切实在最后升华为彩色的恋情，这份前所未有的感情交叠成我能初步理解的“爱”的颜色，哪怕双方最终支离破碎，这份“爱情”的萌芽仍旧让我尝到苦涩与回甘，这褪了色的关系仍旧让我怀恋又恐慌。

日记本里充斥着过去恋情的回音，当初泛滥在字里行间的情绪如今如一滩干涸了的水洼，那粗略记录的对话至今想来还是如一股暖流浸润心脏，经过时间的煎熬，我们的恋情终于仅仅积压在那落了尘的玩偶与相片里，而那暖棕色的小狗、溢彩的相纸则封存在不见光的桌屉里，面对它们，我还是会颤抖着，不忍舍弃，也不忍查看。

感性者总是容易受到各种情绪摆布，纵使日常以第一人称叙事，内心也总将自己置于第三人的位置加以评判，而这种批判犹如阴影一般随持续时间不断拉长，到最后漆黑的眼珠中仿佛只剩下漆黑的自己。`

    content: `第一节写作课，老师在讲台上对我们发问：在座的各位同学有哪些是真心喜欢写作的？我想我应该算是喜欢极了，所以我举起了手，但在放下后又不禁思考：我又写过多少文章、抒发过几句感慨呢？

由于以往的怠惰与忙碌，我似乎一直并没有什么合适的理由沉浸在钟爱的文字当中，没有什么引力能将我拖回真正迷恋的领域，但百篇作文练习的出现，反而给了我一个机会，我终于有一个借口、有一个通道，来容许我重新踏足在文字的世界里。

我从小钟意虚构写作，也就是写故事，写想象，所以我想不论是本学期还是下学期，我都会把大多时间都投入在小说、戏剧的创作当中。从小到大的创作当中，我当然积攒了一部分的灵感与想法，一部分的故事雏形在被创造出来之后因为种种原因停滞，一部分的灵感因为缺乏故事作为土壤而无法萌芽，我希望能以百篇作文作为平台，继续训练自己“写故事”的能力，在专业老师的指导下进一步写出理想中的能够震撼人心、启迪思考的作品，完成我作为中文系学生的使命。

我认为的虚构写作往往需要经过构思与编排，像在组织一支部队，有条不紊地指挥他们一步步完成任务，它想必是个长期工作，但是在日常的见闻里，我们经常需要抒发即时感受，或许是漫游路边偶然见到的一枝叶、一束花，穿过街头听到的啜泣、欢欣……这些点点滴滴更多是落在偏向现实与内心的写作上，所以我也不会放弃对散文、杂文以及日常随笔的练习，我认为我可以专精虚构写作，但是不能缺乏一个中文系学生应当具备的基本写作能力。

想“写”首先要“读”，作为中文系学生，我在百篇作文训练期间不会放弃阅读古今中外的名作，也不会放弃探索“冷门作品”，不会放弃在现实中寻找灵感，阅读世间百态，丈量山川土地。毫无疑问，多读多看多听，是写出好作品的必要条件之一。

“百篇”说来看似繁多，但是经过指导老师的妥当安排，这一篇篇文章被细分在日常生活当中，穿插在课表的间隙里，点缀在我即将迎接的充实生命中，每周两篇的写作安排就像粗茶淡饭，融入生活中，于繁忙中给予我回归文字世界的机会。我向来不是一个会严密计划长期事项的人，而是更加倾向于随心而动，当然，在指导老师细致的写作任务安排之下，同时怀揣着对写作的热情，我不认为自己会犯无法及时提交任务的小差错，反而会积极产出有关自己由生活所得的文字，在思考与练习中丰盈认知、磨练笔力。

我个人有将灵感迅速登记的的习惯，期望能用文字讲述一个不仅仅满足个人的故事，我期待笔下的故事能有如史铁生、余华等写作大家一般的动人心魄的能耐。

我认为文字同样能托举现实，在科技爆发的这个时代，在暗流涌动的现实，它们能够一边掰扯时代的齿轮，一边燃烧起浓烟来，启迪思考、达成进步，带着人民群众脱离某些荒谬与混沌的思想，直视真正有意义的未来。

在本学期的百篇作文训练过程中，我也会以现实为根据，不论是虚构还是非虚构写作，在笔杆子的支撑下，以服务现实社会为目标进行写作。`

      const userPosts = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

      // 合并优先级（单一数据源，杜绝「不同地方显示不同文章」）：

      const map = new Map();
      POSTS.forEach(p => map.set(p.slug, p));
      userPosts.forEach(p => { if (!p._ghIssue) map.set(p.slug, p); });  // 仅未同步的本地文章优先

      let all = [...map.values()].filter(p => !hidden.includes(p.slug));
      // 防御性二次去重
      const seen = new Set();
      all = all.filter(p => { if (seen.has(p.slug)) return false; seen.add(p.slug); return true; });

    // ===== GitHub Issues CMS：文章跨设备存储 =====
    function buildIssueBody(post) {
      const fm = [
        "---",
        "slug: " + (post.slug || ""),
        "category: " + (post.category || "未分类"),
        "tags: " + (post.tags || []).join(", "),
        "date: " + (post.date || ""),
        "draft: " + (post.draft ? "true" : "false"),
        "pinned: " + (post.pinned ? "true" : "false"),
        "updatedAt: " + (post.updatedAt || ""),
        "---",
        "",
        post.content || ""
      ].join("\n");
      return fm;
    }
    // 方案 A：发布前把正文里的 base64 图片抽到仓库 images/，换成 raw 短链接
    // 返回 { content: 替换后的正文, uploaded: 成功数, failed: 失败数 }
    async function uploadImagesInContent(content, token) {
      if (!content || !token) return { content: content || "", uploaded: 0, failed: 0 };
      const re = /data:image\/[a-zA-Z0-9.+-]+;base64,[A-Za-z0-9+/=]+/g;
      const matches = [...content.matchAll(re)];
      if (!matches.length) return { content, uploaded: 0, failed: 0 };
      const extMap = { png:"png", jpeg:"jpg", jpg:"jpg", gif:"gif", webp:"webp", svg:"svg", bmp:"bmp" };
      let result = content, uploaded = 0, failed = 0;
      for (const m of matches) {
        const dataUri = m[0];
        const mime = (dataUri.match(/data:image\/([a-zA-Z0-9.+-]+);/) || [])[1] || "png";
        const ext = extMap[mime] || "png";
        const b64 = dataUri.slice(dataUri.indexOf(",") + 1);
        const filename = `img-${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
        try {
          const res = await fetch(`${GH_CMS.apiBase}/contents/images/${filename}`, {
            method: "PUT",
            headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json", "Accept": "application/vnd.github+json" },
            body: JSON.stringify({ message: `add image ${filename}`, content: b64, branch: "main" })
          });
          if (res.ok) {
            const data = await res.json();
            const url = (data.content && data.content.download_url)
              ? data.content.download_url
              : `https://raw.githubusercontent.com/${GH_CMS.repo}/main/images/${filename}`;
            result = result.split(dataUri).join(url);
            uploaded++;
          } else {
            failed++;
            console.warn("[图片上传] 失败", res.status, (await res.text().catch(() => "")).slice(0, 200));
          }
        } catch (e) { failed++; console.warn("[图片上传] 异常", e.message); }
      }
      if (failed) console.warn(`[图片上传] ${uploaded} 成功 / ${failed} 失败（检查 Token 是否含 Contents 写权限）`);
      return { content: result, uploaded, failed };
    }

    function parseIssueBody(body) {
      const m = (body || "").match(GH_ISSUE_RE);
      if (!m) return { meta: {}, content: body || "" };
      const metaText = m[1], content = m[2];
      const meta = {};
      metaText.split("\n").forEach(line => {
        const idx = line.indexOf(":");
        if (idx > 0) {
          const k = line.slice(0, idx).trim();
          let v = line.slice(idx + 1).trim();
          if (v === "true") v = true; else if (v === "false") v = false;
          meta[k] = v;
        }
      });
      return { meta, content };
    }
    // 公开拉取带 blog 标签的 issues（无需登录，跨设备可读）
    async function fetchPostsFromGitHub() {
      if (!GH_CMS.enabled) return [];
      try {
        const res = await fetch(`${GH_CMS.apiBase}/issues?state=open&per_page=100&labels=${encodeURIComponent(GH_CMS.label)}`, {
          headers: { "Accept": "application/vnd.github+json" }
        });
        if (!res.ok) return [];
        const issues = await res.json();
        if (!Array.isArray(issues)) return [];
        return issues.filter(i => !i.pull_request).map(issue => {
          const { meta, content } = parseIssueBody(issue.body || "");
          const c = (content || "").replace(/[#>*_`~]/g, " ").replace(/\s+/g, " ").trim();
          return {
            slug: meta.slug || ("gh-" + issue.number),
            title: issue.title,
            date: meta.date || (issue.created_at || "").slice(0, 10),
            category: meta.category || "未分类",
            tags: meta.tags ? meta.tags.split(",").map(t => t.trim()).filter(Boolean) : ["未分类"],
            series: meta.series ? meta.series.split(",").map(s => s.trim()).filter(Boolean) : [],
            draft: !!meta.draft,
            pinned: !!meta.pinned,
            excerpt: c.length > 80 ? c.slice(0, 80) + "…" : (c || "（无文字内容）"),
            content: content,
            updatedAt: meta.updatedAt || (issue.updated_at || "").slice(0, 10),
            _ghIssue: issue.number,
            _ghSource: true
          };
        });
      } catch (e) { return []; }
    }
    // 管理员用本机 PAT 创建/更新 Issue；返回是否成功
    async function pushPostToGitHub(post) {
      const token = localStorage.getItem(GH_TOKEN_KEY);
      if (!token) {
        alert("未配置 GitHub Token：文章仅存本机。\n请在「设置 → GitHub 同步」粘贴 Token，发布后才会跨设备可见。");
        return { ok: false };
      }
      // 方案 A：先抽 base64 图片 → 传仓库 images/ → 换成 raw 短链接，再发 Issue
      const img = await uploadImagesInContent(post.content, token);
      const postForIssue = Object.assign({}, post, { content: img.content });
      const body = buildIssueBody(postForIssue);
      // 极端长文（纯文字超 65536）的最后兜底；图片已抽离，极少触发
      const GH_BODY_MAX = 65000;
      let truncated = false;
      let safeBody = body;
      if (safeBody.length > GH_BODY_MAX) {
        safeBody = safeBody.slice(0, GH_BODY_MAX) + "\n\n[…内容过长，已截断。完整内容请在本机查看。]";
        truncated = true;
      }
      const labels = [GH_CMS.label];
      if (post.category) labels.push(post.category);
      const headers = {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json",
        "Accept": "application/vnd.github+json"
      };
      try {
        if (post._ghIssue) {
          const r = await fetch(`${GH_CMS.apiBase}/issues/${post._ghIssue}`, {
            method: "PATCH", headers,
            body: JSON.stringify({ title: post.title, body: safeBody, labels })
          });
          if (!r.ok) { alert("更新 Issue 失败：" + r.status); return false; }
        } else {
          // 先尝试带标签创建；若 422（常见：标签不存在），降级为不带标签重试
          const payload = { title: post.title, body: safeBody, labels };
          let res = await fetch(`${GH_CMS.apiBase}/issues`, {
            method: "POST", headers,
            body: JSON.stringify(payload)
          });
          if (!res.ok && res.status === 422) {
            // 降级：去掉 labels 重试（GitHub 不接受不存在的标签名）
            res = await fetch(`${GH_CMS.apiBase}/issues`, {
              method: "POST", headers,
              body: JSON.stringify({ title: post.title, body: safeBody })
            });
          }
          if (!res.ok) {
            let errBody = {};
            try { errBody = await res.json(); } catch(e) {}
            alert("同步失败：" + res.status + "\n" +
              (errBody.message || "") + "\n" +
              (errBody.errors ? JSON.stringify(errBody.errors) : "") +
              "\n\n可能原因：Token 无该仓库写权限 / 标签不存在 / 仓库禁用了 Issues。");
            return false;
          }
          const data = await res.json();
          post._ghIssue = data.number;
        }
        return { ok: true, truncated, imgUploaded: img.uploaded, imgFailed: img.failed };
      } catch (e) { alert("同步到 GitHub 失败：" + e.message); return { ok: false, imgFailed: img.failed }; }
    }
    // 关闭（删除）GitHub 上的 Issue
    async function closeGithubIssue(issueNumber) {

    // ===== 标签迁移 - 批量合并标签 =====
    function migrateTags() {
      const migrations = [
        { from: ['校园'], to: '校园纪游' },
        { from: ['影评', '书评影评', '学习笔记', '读书', '总结', '总结规划', '哲学'], to: '评论' },
        { from: ['讲座', '讲座报道', '调研', '调研报告'], to: '报告' },
      ];

      const userPosts = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      let changed = false;

      function runMigration(post) {
        let c = false;
        migrations.forEach(({from, to}) => {
          from.forEach(f => {
            const before = post.tags.length;
            post.tags = post.tags.filter(t => t !== f);
            if (post.tags.length !== before) {
              post.tags.push(to);
              c = true;
            }
            if (post.category === f) {
              post.category = to;
              c = true;
            }
          });
        });
        post.tags = [...new Set(post.tags)];
        return c;
      }

      // 迁移默认文章
      POSTS.forEach(p => runMigration(p));
      // 迁移用户文章
      userPosts.forEach(p => { if (runMigration(p)) changed = true; });

      if (changed) localStorage.setItem(STORAGE_KEY, JSON.stringify(userPosts));
      console.log('标签迁移完成');
    }

    // ===== 自动保存 =====
    let _autosaveTimer = null;
    let _autosaveSlug = null;
    function startAutosave(slug) {
      stopAutosave();
      _autosaveSlug = slug;
      _autosaveTimer = setInterval(() => {
        const ed = document.getElementById("edit-content");
        if (!ed) return;
        const buf = {
          slug,
          title: document.getElementById("edit-title")?.value || "",
          date: document.getElementById("edit-date")?.value || "",
          category: document.getElementById("edit-category")?.value || "",
          tags: document.getElementById("edit-tags")?.value || "",
          series: document.getElementById("edit-series")?.value || "",
          draft: document.getElementById("edit-draft")?.checked || false,
          pinned: document.getElementById("edit-pinned")?.checked || false,
          content: getEditorMarkdown(),
          savedAt: new Date().toISOString()
        };
        try { localStorage.setItem("autosave_" + slug, JSON.stringify(buf)); } catch (e) {}
      }, 5000);
    }
    function stopAutosave() {
      if (_autosaveTimer) { clearInterval(_autosaveTimer); _autosaveTimer = null; }
    }
    function clearAutosave(slug) {
      if (slug) localStorage.removeItem("autosave_" + slug);
    }
    function tryRestoreAutosave(slug, post) {
      let buf;
      try { buf = JSON.parse(localStorage.getItem("autosave_" + slug) || "null"); } catch { return false; }
      if (!buf || !buf.content) return false;
      // 已发布且自动保存更早则放弃恢复
      if (post && post.updatedAt && buf.savedAt && buf.savedAt < post.updatedAt) return false;
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ""; };
      set("edit-title", buf.title);
      set("edit-date", buf.date);
      set("edit-tags", buf.tags);
      set("edit-series", buf.series);
      const ed = document.getElementById("edit-content");
      if (ed) ed.innerHTML = renderMarkdown(buf.content);
      const d = document.getElementById("edit-draft"); if (d) d.checked = !!buf.draft;
      const p = document.getElementById("edit-pinned"); if (p) p.checked = !!buf.pinned;
      const note = document.getElementById("autosave-note");
      if (note) note.style.display = "block";
      return true;
    }

    // ===== 富文本编辑器辅助 =====
    let _turndown = null;
    function getTurndown() {
      if (!_turndown && typeof TurndownService !== "undefined") {
        _turndown = new TurndownService({ headingStyle: "atx", codeBlockStyle: "fenced", bulletListMarker: "-" });
      }
      return _turndown;
    }
    function rteExec(command, value) {
      document.getElementById("edit-content").focus();
      document.execCommand(command, false, value || null);
    }
    function rteLink() {
      const url = prompt("输入链接地址：", "https://");
      if (!url) return;
      document.getElementById("edit-content").focus();
      document.execCommand("createLink", false, url);
    }
    function rteClearFormat() {
      document.getElementById("edit-content").focus();
      document.execCommand("removeFormat", false, null);
      document.execCommand("formatBlock", false, "P");
    }
    function rteAlign(align) {
      const ed = document.getElementById("edit-content");
      ed.focus();
      document.execCommand("justify" + align.charAt(0).toUpperCase() + align.slice(1), false, null);
    }
    function rteLineHeight(value) {
      if (!value) return;
      const ed = document.getElementById("edit-content");
      ed.focus();
      // 对当前选区所在段落设置行距（通过 style）
      const sel = window.getSelection();
      if (sel.rangeCount > 0) {
        let node = sel.anchorNode;
        while (node && node !== ed) {
          if (node.nodeType === 1 && (node.tagName === 'P' || node.tagName === 'DIV')) {
            node.style.lineHeight = value;
            break;
          }
          node = node.parentNode;
        }
      }
    }
    function getEditorMarkdown() {
      const ed = document.getElementById("edit-content");
      if (!ed) return "";
      // 清理 contenteditable 产生的残留对齐样式，防止段落意外居中
      let html = ed.innerHTML;
      html = html.replace(/style="[^"]*text-align\s*:\s*center[^"]*"/gi, '');
      html = html.replace(/style="[^"]*text-align\s*:\s*(left|right|justify)[^"]*"/gi, '');
      html = html.replace(/<div[^>]*>\s*<\/div>/gi, '');   // 空占位 div
      ed.innerHTML = html;
      const td = getTurndown();
      let md;
      if (td) md = td.turndown(ed.innerHTML).trim();
      else md = (ed.innerText || "").trim(); // turndown 未加载时降级为纯文本
      // 清理空行
      return md.replace(/\n{3,}/g, "\n\n");
    }

    function savePost(oldSlug) {
      const title = document.getElementById("edit-title").value.trim();
      const date = document.getElementById("edit-date").value;
      const category = document.getElementById("edit-category").value;
      const tagsStr = document.getElementById("edit-tags").value.trim();
      const content = getEditorMarkdown();

      if (!title || !content) {
        alert("标题和正文不能为空");
        return;
      }

      const tags = tagsStr ? tagsStr.split(/[,，、]/).map(t => t.trim()).filter(t => t) : ["未分类"];
      const seriesStr = document.getElementById("edit-series").value.trim();
      const series = seriesStr ? seriesStr.split(/[,，、]/).map(s => s.trim()).filter(Boolean) : [];
      const draft = document.getElementById("edit-draft").checked;
      const pinned = document.getElementById("edit-pinned").checked;
      const slug = oldSlug || ("user-" + Date.now().toString(36));
      const imgCount = (content.match(IMG_RE) || []).length;
      let excerpt = content.replace(IMG_RE, " ").replace(/[#>*_`~]/g, " ").replace(/\s+/g, " ").trim().slice(0, 80);
      if (!excerpt) excerpt = imgCount > 0 ? `（含 ${imgCount} 张图片）` : "（无文字内容）";
      else if (excerpt.length >= 80) excerpt += "…";

      const now = new Date().toISOString().slice(0,10);
      const post = { slug, title, date, category, tags, series, draft, pinned, excerpt, content, updatedAt: now };
      // 若编辑的是已同步到 GitHub 的文章，保留 issue 号以便更新同一篇
      if (oldSlug) {
        const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]").find(p => p.slug === oldSlug);
        if (existing && existing._ghIssue) post._ghIssue = existing._ghIssue;
      }
      saveUserPost(post);
      clearAutosave(oldSlug || "new");
      stopAutosave();
      closeModal();
      navigate("home", null, { replace: true });
      handleRoute();
      // 异步同步到 GitHub（仅非草稿；草稿留本地，避免公开仓库泄露未定稿）
      if (GH_CMS.enabled && isAdmin && !draft) {
        pushPostToGitHub(post).then(ok => {
          if (ok) {
            // 把 issue 号存回本地，便于下次编辑更新同一篇
            const ups = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            const i = ups.findIndex(p => p.slug === post.slug);
            if (i >= 0) { ups[i]._ghIssue = post._ghIssue; ups[i]._ghSource = true; localStorage.setItem(STORAGE_KEY, JSON.stringify(ups)); }
            // 刷新 GitHub 缓存并重渲染，使任意设备立即可见
            fetchPostsFromGitHub().then(list => { GH_POSTS = list; if (!document.getElementById("modal-overlay").classList.contains("open")) handleRoute(); });
          }
        });
      }
    }

    function deletePost(slug) {
      if (!confirm("确定删除这篇文章吗？\n删除后将从本站移除（已同步到云端的文章会一并关闭对应 Issue）。")) return;
      // 取出文章（本地或 GitHub 副本都要看），以便拿到 issue 号
      const localPost = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]").find(p => p.slug === slug);
      const ghPost = GH_POSTS.find(p => p.slug === slug);
      const issueNum = (localPost && localPost._ghIssue) || (ghPost && ghPost._ghIssue);
      // 1) 立即从所有数据源移除
      if (slug.startsWith("user-")) deleteUserPost(slug);
      hideSlug(slug);   // ← 关键：所有删除都记入隐藏列表，即使云端重新拉取也不会「复活」
      GH_POSTS = GH_POSTS.filter(p => p.slug !== slug);
      // 2) 云端关闭对应 Issue（若已同步）；关闭成功后刷新缓存，但隐藏列表仍会过滤掉它
      if (issueNum) {
        closeGithubIssue(issueNum).then(() => fetchPostsFromGitHub().then(l => { GH_POSTS = l; }));
      }
      closeModal();
      navigate("home");
      handleRoute();
    }

    function getLikes(slug) {
      const likes = JSON.parse(localStorage.getItem(LIKES_KEY) || "{}");
      return likes[slug] || 0;
    }
    function isLiked(slug) {
      const liked = JSON.parse(localStorage.getItem("zhuer_blog_liked") || "[]");
      return liked.includes(slug);
    }
    function localToggleLike(slug) {
      const likes = JSON.parse(localStorage.getItem(LIKES_KEY) || "{}");
      const liked = JSON.parse(localStorage.getItem("zhuer_blog_liked") || "[]");
      if (liked.includes(slug)) {
        liked.splice(liked.indexOf(slug), 1);
        likes[slug] = Math.max(0, (likes[slug] || 0) - 1);
      } else {
        liked.push(slug);
        likes[slug] = (likes[slug] || 0) + 1;
      }
      localStorage.setItem(LIKES_KEY, JSON.stringify(likes));
      localStorage.setItem("zhuer_blog_liked", JSON.stringify(liked));
      // 更新显示
      const btn = document.getElementById('like-btn');
      if (btn) {
        btn.classList.toggle('liked', liked.includes(slug));
        btn.querySelector('.like-count').textContent = likes[slug] || 0;
      }
    }

    function showToast(msg) {
      let t = document.getElementById("toast");
      if (!t) {
        t = document.createElement("div");
        t.id = "toast";
        t.className = "toast";
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
    }
    function sharePost(slug) {
      const post = getAllPosts().find(p => p.slug === slug);
      const title = post ? post.title : "铸言";
      const url = new URL("posts/" + encodeURIComponent(slug) + ".html", location.href).href;
      const data = { title: title, text: "来自「铸言」的文章：" + title, url: url };
      if (navigator.share) {
        navigator.share(data).catch(() => {});
        return;
      }
      const done = () => showToast("链接已复制，去分享吧");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(done).catch(() => fallbackCopy(url, done));
      } else {
        fallbackCopy(url, done);
      }
    }
    function fallbackCopy(text, cb) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); } catch (e) {}
      document.body.removeChild(ta);
      if (cb) cb();
    }

    // 一键把本机所有非草稿文章发布/更新到 GitHub Issues（跨设备可见）
    async function publishAllToGithub() {
      const token = localStorage.getItem(GH_TOKEN_KEY);
      if (!token) { alert("请先在上方填写 GitHub Token 并点「保存 Token」，再发布。"); return; }
      const userPosts = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      const toPublish = userPosts.filter(p => !p.draft);
      if (!toPublish.length) { alert("本机没有可发布的非草稿文章。"); return; }
      if (!confirm(`将把本机 ${toPublish.length} 篇非草稿文章发布/更新到 GitHub Issues，所有人立即可见。继续？`)) return;
      let ok = 0, fail = 0, truncatedList = [], imgUploadedTotal = 0, imgFailedTotal = 0;
      const today = new Date().toISOString().slice(0, 10);
      for (const post of toPublish) {
        post.updatedAt = today; // 刷新更新时间，使文章进入「最新」
        const r = await pushPostToGitHub(post);
        if (r && r.ok) {
          ok++;
          if (r.truncated) truncatedList.push(post.title || post.slug);
          if (r.imgUploaded) imgUploadedTotal += r.imgUploaded;
          if (r.imgFailed) imgFailedTotal += r.imgFailed;
          // 回写 issue 号与更新时间到本机覆盖副本
          const ups = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          const i = ups.findIndex(p => p.slug === post.slug);
          if (i >= 0) {
            ups[i].updatedAt = today;
            if (post._ghIssue) { ups[i]._ghIssue = post._ghIssue; ups[i]._ghSource = true; }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(ups));
          }
        } else {
          fail++;
          if (r && r.imgFailed) imgFailedTotal += r.imgFailed;
        }
      }
      // 刷新 GitHub 缓存并重渲染，使任意设备立即可见
      const list = await fetchPostsFromGitHub();
      GH_POSTS = list;
      if (!document.getElementById("modal-overlay").classList.contains("open")) handleRoute();
      let msg = `发布完成 ✅\n成功 ${ok} 篇，失败 ${fail} 篇。\n已同步的文章现在所有人可见，且进入「最新」。\n（草稿仍留本机，不会公开）`;
      if (imgUploadedTotal) msg += `\n🖼️ 已上传 ${imgUploadedTotal} 张图片到仓库 images/`;
      if (imgFailedTotal) msg += `\n⚠️ ${imgFailedTotal} 张图片上传失败（需给 Token 加 Contents: Read and Write 权限）`;
      if (truncatedList.length) {
        msg += `\n\n⚠️ 以下文章内容超长，已截断（GitHub 65536字符限制）：\n${truncatedList.map((t,i) => `${i+1}. ${t}`).join("\n")}`;
      }
      alert(msg);
    }

    // ===== 工具函数 =====
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return d.getFullYear() + "年" + String(d.getMonth()+1).padStart(2,"0") + "月" + String(d.getDate()).padStart(2,"0") + "日";
    }

    function renderMarkdown(content) {
      if (typeof marked === "undefined" || typeof DOMPurify === "undefined") {
        // 库尚未加载（defer 延迟），降级为纯文本 + 基本转义
        return content.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
      }
      const rawHtml = marked.parse(content);
      // 清理编辑器残留的行内对齐样式（contenteditable 注入的 text-align:center 等）
      const cleanHtml = rawHtml.replace(/style="[^"]*text-align\s*:\s*(center|right|justify)[^"]*"/gi, '');
      return DOMPurify.sanitize(cleanHtml);
    }

    // 统计文章内图片数量（base64 或外链）
    const IMG_RE = /!\[[^\]]*\]\((data:image|https?:\/\/)[^)]*\)/g;
    function getImageCount(content) {
      if (!content) return 0;
      const m = content.match(IMG_RE);
      return m ? m.length : 0;
    }
    // 列表摘要：若混入图片原始数据则重新提取纯文本，避免 base64 乱码
    function displayExcerpt(post) {
      const raw = post.excerpt || "";
      if (/data:image|!\[/.test(raw)) {
        const text = (post.content || "")
          .replace(IMG_RE, " ")
          .replace(/[#>*_`~]/g, " ")
          .replace(/\s+/g, " ")
          .trim();
        return text.slice(0, 80) + (text.length > 80 ? "…" : "");
      }
      return raw;
    }

    // 阅读时长估算：中文约 350 字/分钟
    function readingTime(content) {
      const text = (content || "")
        .replace(IMG_RE, " ")
        .replace(/[#>*_`~\[\]()!]/g, " ")
        .replace(/\s+/g, "");
      return Math.max(1, Math.round(text.length / 350));
    }

    // 系列聚合：静态 SERIES_DEFS + 文章自带 series 字段
    function getAllSeries() {
      const all = getAllPosts();
      const list = [];
      SERIES_DEFS.forEach(def => {
        const posts = all.filter(def.match);
        if (posts.length) list.push({ name: def.name, desc: def.desc, posts });
      });
      const grouped = {};
      all.forEach(p => {
        if (!p.series) return;
        const names = Array.isArray(p.series)
          ? p.series
          : String(p.series).split(/[,，、]/).map(s => s.trim()).filter(Boolean);
        names.forEach(n => { (grouped[n] = grouped[n] || []).push(p); });
      });
      Object.keys(grouped).sort().forEach(n => {
        list.push({ name: n, desc: `「${n}」系列合集`, posts: grouped[n] });
      });
      return list;
    }
    function getSeriesIndex(name) {

    // ===== 筛选状态 =====
    let currentFilter = { category: null, tag: null, featured: false };
    let filterOpen = false;
    let currentSearch = "";

    function getAllCategories() {
      const catMap = new Map();
      getAllPosts().forEach(post => {
        if (post.category) catMap.set(post.category, (catMap.get(post.category) || 0) + 1);
      });
      return Array.from(catMap.entries()).map(([category, count]) => ({ category, count })).sort((a, b) => b.count - a.count);
    }

    // 是否在「最新」时效期内（默认 3 天）：优先按 updatedAt，缺则退回 date
    function isRecentlyUpdated(post, days = 3) {
      const u = post.updatedAt || post.date;
      if (!u) return false;
      const d = new Date(u + "T00:00:00");
      if (isNaN(d.getTime())) return false;
      const diff = (Date.now() - d.getTime()) / 86400000;
      return diff >= 0 && diff <= days;
    }

    function getFilteredPosts() {
      let posts = [...getAllPosts()];
      if (currentFilter.featured) posts = posts.filter(p => p.pinned);
      if (currentFilter.category) posts = posts.filter(p => p.category === currentFilter.category);
      if (currentFilter.tag) posts = posts.filter(p => p.tags.some(t => t.toLowerCase() === currentFilter.tag.toLowerCase()));
      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        posts = posts.filter(p =>
          p.title.toLowerCase().includes(q) ||
          p.content.toLowerCase().includes(q) ||
          (p.category && p.category.toLowerCase().includes(q)) ||
          p.tags.some(t => t.toLowerCase().includes(q))
        );
      }
      return posts.sort((a, b) => {
        // 三级排序：最新(3天内更新) > 精选(置顶) > 普通
        const rank = p => (!p.pinned && isRecentlyUpdated(p, 3)) ? 2 : (p.pinned ? 1 : 0);
        const ra = rank(a), rb = rank(b);
        if (ra !== rb) return rb - ra;
        // 同组内排序：最新组按更新时间倒序，其余按日期
        if (ra === 2) {
          const ua = a.updatedAt || a.date || "", ub = b.updatedAt || b.date || "";
          return ua < ub ? 1 : -1;
        }
        return sortMode === "desc" ? (a.date < b.date ? 1 : -1) : (a.date > b.date ? 1 : -1);
      });
    }

    function getAvailableTags(category) {
      const tagMap = new Map();
      const posts = category ? getAllPosts().filter(p => p.category === category) : getAllPosts();
      posts.forEach(post => post.tags.forEach(tag => tagMap.set(tag, (tagMap.get(tag) || 0) + 1)));
      return Array.from(tagMap.entries()).map(([tag, count]) => ({ tag, count })).sort((a, b) => b.count - a.count);
    }

    function getAvailableCategories(tag) {
      const catMap = new Map();
      const posts = tag ? getAllPosts().filter(p => p.tags.some(t => t.toLowerCase() === tag.toLowerCase())) : getAllPosts();
      posts.forEach(post => { if (post.category) catMap.set(post.category, (catMap.get(post.category) || 0) + 1); });
      return Array.from(catMap.entries()).map(([category, count]) => ({ category, count })).sort((a, b) => b.count - a.count);
    }

    function getAllTags() {
      const tagMap = new Map();
      getAllPosts().forEach(post => {
        // 合并文体到标签
        if (post.category) tagMap.set(post.category, (tagMap.get(post.category) || 0) + 1);
        post.tags.forEach(tag => tagMap.set(tag, (tagMap.get(tag) || 0) + 1));
      });
      return Array.from(tagMap.entries()).map(([tag, count]) => ({ tag, count })).sort((a, b) => b.count - a.count);
    }

    function getPostsByTag(tag) {
      const tl = tag.toLowerCase();
      return getAllPosts().filter(p =>
        p.tags.some(t => t.toLowerCase() === tl) ||
        (p.category && p.category.toLowerCase() === tl)
      );
    }

    // ===== 路由 =====
    const SCROLL_TTL = 3 * 60 * 1000; // 3分钟

    function saveScrollState(key) {
      sessionStorage.setItem("scroll_" + key, JSON.stringify({ y: window.scrollY, t: Date.now() }));
    }
    function restoreScrollState(key) {
      const raw = sessionStorage.getItem("scroll_" + key);
      if (!raw) return false;
      const { y, t } = JSON.parse(raw);
      if (Date.now() - t > SCROLL_TTL) { sessionStorage.removeItem("scroll_" + key); return false; }
      // 首页等内容可能为异步渲染（GitHub Issues 拉取），滚动高度需等待就绪，故多次尝试定位
      let tries = 0;
      const tryScroll = () => {
        const docH = document.documentElement.scrollHeight - window.innerHeight;
        if (window.scrollY === y || docH >= y || tries > 8) {
          window.scrollTo({ top: y, behavior: "instant" });
          if (tries > 8) sessionStorage.removeItem("scroll_" + key); // 多次失败则放弃，避免陈旧
          return;
        }
        tries++;
        setTimeout(tryScroll, 60);
      };
      tryScroll();
      return true;
    }

    // ===== 文章续读进度（持久化，按 slug 保存上次阅读到的滚动位置）=====
    function saveReadingProgress(slug, y) {
      try {
        const docH = document.documentElement.scrollHeight - window.innerHeight;
        // 接近底部视为已读完，不再续读（下次从头开始）
        const finished = docH > 0 && y >= docH - 40;
        if (finished) { localStorage.removeItem("read_" + slug); return; }
        localStorage.setItem("read_" + slug, JSON.stringify({ y: Math.max(0, Math.round(y)), t: Date.now() }));
      } catch (e) {}
    }
    function getReadingProgress(slug) {
      try {
        const raw = localStorage.getItem("read_" + slug);
        if (!raw) return null;
        const { y } = JSON.parse(raw);
        return (typeof y === "number" && y > 0) ? y : null;
      } catch (e) { return null; }
    }
    let _postScrollHandler = null;

    // 记录上一页，用于智能返回
    function getPrevRoute() {
      try { return JSON.parse(sessionStorage.getItem("routeHistory") || "[]"); } catch { return []; }
    }
    function pushRouteHistory(route, param) {
      const arr = getPrevRoute();
      arr.push({ route, param, time: Date.now() });
      if (arr.length > 10) arr.shift();
      sessionStorage.setItem("routeHistory", JSON.stringify(arr));
    }
    function popRouteHistory() {
      const arr = getPrevRoute();
      return arr.pop() || null;
    }

    function navigate(route, param, opts = {}) {
      const { replace = false, saveScroll = true } = opts;
      const currentHash = window.location.hash.slice(1) || "home";
      const currentRoute = currentHash.split("/")[0];

      // 离开当前页前保存滚动位置
      if (saveScroll && currentRoute === "home") saveScrollState("home");
      if (saveScroll && currentRoute === "tag") saveScrollState("tag_" + currentHash.split("/")[1]);
      if (saveScroll && currentRoute === "post") {
        const sp = currentHash.split("/")[1];
        if (sp) saveReadingProgress(sp, window.scrollY);
      }

      let h = route;
      if (param) h += "/" + encodeURIComponent(param);

      if (replace) {
        window.location.replace("#" + h);
      } else {
        window.location.hash = h;
      }
      // 注：不再维护自定义 routeHistory 栈，返回统一走浏览器真实历史（history.back），
      // 避免自定义栈与浏览器历史脱节导致「返回到错误页面」。
    }

    function goBack() {
      // 直接复用浏览器真实历史（与浏览器返回键行为一致），避免自定义栈脱节导致返回错页。
      // 仅当没有任何可回退的历史时（如直接深链进入），才回首页。
      if (window.history.length > 1) {
        window.history.back();
      } else {
        navigate("home", null, { replace: true });
      }
    }

    function handleRoute() {
      const hash = window.location.hash.slice(1) || "home";
      const parts = hash.split("/");
      const route = parts[0];
      const param = parts[1] ? decodeURIComponent(parts[1]) : null;

      document.querySelectorAll(".nav a").forEach(a => a.classList.remove("active"));
      const navMap = { home: "nav-home", tags: "nav-tags", tag: "nav-tags", series: "nav-series", "series-detail": "nav-series", guestbook: "nav-guestbook", about: "nav-about", timeline: "nav-timeline", post: "nav-home" };
      const navId = navMap[route] || "nav-home";
      const navEl = document.getElementById(navId);
      if (navEl) navEl.classList.add("active");

      // 滚动位置管理：3分钟内返回恢复位置（首页/标签）
      let restored = false;
      if (route === "home") {
        restored = restoreScrollState("home");
      } else if (route === "tag" && param) {
        restored = restoreScrollState("tag_" + param);
      }
      if (route === "post" && param) {
        // 续读：有保存的阅读进度则恢复到该位置；首次阅读（无进度）从头开始
        const y = getReadingProgress(param);
        if (y) {
          setTimeout(() => window.scrollTo({ top: y, behavior: "instant" }), 0);
        } else {
          window.scrollTo(0, 0);
        }
      } else if (!restored) {
        window.scrollTo(0, 0);
      }

      // 重新触发动画 + 页面过渡
      const app = document.getElementById("app");
      app.style.animation = "none";
      void app.offsetWidth;
      app.style.animation = "pageSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1)";

      switch (route) {
        case "home": renderHome(); break;
        case "post": renderPost(param); break;
        case "tags": renderTags(); break;
        case "tag": renderTagPosts(param); break;
        case "series": renderSeries(); break;
        case "series-detail": renderSeriesDetail(parseInt(param)); break;
        case "guestbook": renderGuestbook(); break;
        case "tag-manage": renderTagManage(); break;
        case "about": renderAbout(); break;
        case "timeline": renderTimeline(); break;
        default: renderHome();
      }

      // 观察滚动动画
      setTimeout(observeReveal, 50);
    }

    // ===== 页面渲染 =====
    function renderHome() {
      const app = document.getElementById("app");
      const posts = getFilteredPosts();
      const tags = getAllTags();

      let filterHTML = '<div class="filter-panel-inner">';

      // 排序按钮
      filterHTML += '<div class="sort-row">';
      filterHTML += '<div class="filter-label" style="margin-bottom:0;align-self:center;">排序</div>';
      filterHTML += `<div class="sort-btn ${sortMode === "desc" ? "active" : ""}" onclick="setSort('desc')">按时间倒序</div>`;
      filterHTML += `<div class="sort-btn ${sortMode === "asc" ? "active" : ""}" onclick="setSort('asc')">按时间正序</div>`;
      filterHTML += '</div>';

      // 精选集入口
      const pinnedCount = getAllPosts().filter(p => p.pinned).length;
      if (pinnedCount > 0) {
        filterHTML += '<div class="filter-section">';

        filterHTML += '<div class="filter-chips">';
        if (currentFilter.featured) {
          filterHTML += `<div class="filter-chip active" onclick="setFilter('featured',false)">★ 精选集 ✕</div>`;
        } else {
          filterHTML += `<div class="filter-chip" onclick="setFilter('featured',true)" style="border-color:var(--accent);color:var(--accent);">★ 精选集 <span class="chip-count">${pinnedCount}</span></div>`;
        }
        filterHTML += '</div></div>';
      }

      // 标签筛选（包含文体）
      if (tags.length > 0) {
        filterHTML += '<div class="filter-section">';
        filterHTML += '<div class="filter-label">标签';
        if (currentFilter.tag || currentFilter.category) filterHTML += ` <span class="filter-clear" onclick="setFilter('tag',null);setFilter('category',null)">清除</span>`;
        filterHTML += '</div>';
        filterHTML += '<div class="filter-chips">';
        const activeFilter = currentFilter.tag || currentFilter.category;
        if (activeFilter) {
          filterHTML += `<div class="filter-chip active" onclick="setFilter('tag',null);setFilter('category',null)">#${activeFilter} ✕</div>`;
          tags.forEach(({ tag, count }) => {
            if (tag !== activeFilter) filterHTML += `<div class="filter-chip" onclick="setFilter('tag','${tag}')">#${tag} <span class="chip-count">${count}</span></div>`;
          });
        } else {
          tags.forEach(({ tag, count }) => {
            filterHTML += `<div class="filter-chip" onclick="setFilter('tag','${tag}')">#${tag} <span class="chip-count">${count}</span></div>`;
          });
        }
        filterHTML += '</div></div>';
      }

      filterHTML += '</div>';

      const dailyQuote = getDailyQuote();
      app.innerHTML = `
        <section class="hero">
          <h1><span class="char">铸</span><span class="char">言</span></h1>
          <div class="hero-sub">${dailyQuote.text}</div>
          <div class="hero-source">—— ${dailyQuote.source}</div>
        </section>
        <section>
          <div class="search-bar">
            <span class="search-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" width="17" height="17"><circle cx="8.5" cy="8.5" r="6" fill="none" stroke="currentColor" stroke-width="1.4"/><line x1="13" y1="13" x2="18" y2="18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </span>
            <input type="text" id="search-input" placeholder="搜索标题、正文、标签、文体…" value="${currentSearch}" oninput="onSearchInput(this.value)">
            <button class="search-clear" id="search-clear-btn" title="清除搜索" style="display:${currentSearch ? 'flex' : 'none'};" onclick="clearSearch()">✕</button>
          </div>
          <div style="margin-bottom:24px;">
            <button class="filter-trigger ${filterOpen ? 'open' : ''}" onclick="toggleFilter()">
              <span class="dot"></span>
              筛选
              <span class="arrow">▼</span>
            </button>
            <div class="filter-panel ${filterOpen ? 'open' : ''}" id="filter-panel">
              ${filterHTML}
            </div>
          </div>
          <div id="post-list"></div>
        </section>
      `;
      renderPostList();
    }

    function toggleFilter() {
      filterOpen = !filterOpen;
      const trigger = document.querySelector(".filter-trigger");
      const panel = document.getElementById("filter-panel");
      if (trigger) trigger.classList.toggle("open", filterOpen);
      if (panel) panel.classList.toggle("open", filterOpen);
    }

    function setSort(mode) {
      sortMode = mode;
      renderHome();
    }

    function setFilter(type, value) {
      if (type === "category") currentFilter.category = value;
      else if (type === "tag") currentFilter.tag = value;
      else if (type === "featured") currentFilter.featured = value;
      renderHome();
    }

    function clearFilter() {
      currentFilter = { category: null, tag: null, featured: false };
      renderHome();
    }

    function onSearchInput(val) {
      currentSearch = (val || "").trim();
      const btn = document.getElementById("search-clear-btn");
      if (btn) btn.style.display = currentSearch ? "flex" : "none";
      renderPostList();
    }

    function clearSearch() {
      currentSearch = "";
      renderHome();
    }

    function highlight(text, q) {
      if (!q) return escapeHtml(text);
      const lower = text.toLowerCase();
      const ql = q.toLowerCase();
      let out = "";
      let i = 0;
      while (i < text.length) {
        const idx = lower.indexOf(ql, i);
        if (idx === -1) { out += escapeHtml(text.slice(i)); break; }
        out += escapeHtml(text.slice(i, idx));
        out += "<mark>" + escapeHtml(text.slice(idx, idx + q.length)) + "</mark>";
        i = idx + q.length;
      }
      return out;
    }

    function renderPostList() {
      const container = document.getElementById("post-list");
      if (!container) return;
      // 同步未完成前不渲染文章列表：先显示「同步中」，避免本地数据先出、云端覆盖后文章整体跳动/重排
      // （这正是「不同地方显示不同文章」的根因——两段式渲染让同一篇文章在不同状态下出现在不同区块）
      if (GH_CMS.enabled && !ghReady) {
        container.innerHTML = '<div class="loading" style="padding:48px 0;">正在从云端同步文章…<br><span style="font-size:12px;color:var(--fg-light);">若长时间停留在此，请检查网络或 GitHub Token</span></div>';
        return;
      }
      const all = getFilteredPosts();

      let info = "";
      if (currentSearch) {
        info = `<div class="filter-result-info">搜索「${escapeHtml(currentSearch)}」 · 共 ${all.length} 篇 <span class="filter-clear" onclick="clearSearch()">清除搜索</span></div>`;
      } else if (currentFilter.category || currentFilter.tag || currentFilter.featured) {
        let parts = [];
        if (currentFilter.featured) parts.push("★ 精选集");
        if (currentFilter.category) parts.push(currentFilter.category);
        if (currentFilter.tag) parts.push("#" + currentFilter.tag);
        info = `<div class="filter-result-info">筛选：${parts.join(" + ")} · 共 ${all.length} 篇 <span class="filter-clear" onclick="clearSearch();clearFilter()">全部清除</span></div>`;
      } else {
        info = `<div class="section-title">
          <h2>全部文章</h2><div class="line"></div><span class="count">${all.length} 篇</span>
          <div class="view-toggle">
            <button class="view-btn ${viewMode === 'list' ? 'active' : ''}" onclick="setViewMode('list')" title="列表视图">☰ 列表</button>
            <button class="view-btn ${viewMode === 'grid' ? 'active' : ''}" onclick="setViewMode('grid')" title="卡片视图">▦ 卡片</button>
          </div>
        </div>`;
      }

      // 卡片网格模式
      if (viewMode === 'grid' && !currentSearch && !currentFilter.category && !currentFilter.tag && !currentFilter.featured) {
        const gridHTML = `<div class="post-grid">` +
          all.map((post, i) => `
            <div class="featured-card reveal ${post.pinned ? 'is-featured' : ''}" style="transition-delay:${Math.min(i * 0.04, 0.4)}s" onclick="navigate('post','${post.slug}')">
              <div class="post-meta"><time>${formatDate(post.date)}</time><span>·</span>${post.category || "未分类"}<span>·</span><span>${post.tags.length} 个标签</span></div>
              <h3>${escapeHtml(post.title)}</h3>
              ${post.pinned ? `<div class="card-badge pin-badge">★ 精选</div>` : (isRecentlyUpdated(post, 3) ? `<div class="card-badge latest-badge">● 最新</div>` : "")}
              <p class="excerpt">${displayExcerpt(post)}</p>
              <div class="post-tags">${post.tags.slice(0,4).map(t => `<span class="post-tag">#${t}</span>`).join("")}${post.tags.length > 4 ? `<span class="post-tag">+${post.tags.length-4}</span>` : ""}</div>
              ${isAdmin ? `<div style="margin-top:10px;"><button class="post-edit-btn" onclick="event.stopPropagation();toggleFeatured('${post.slug}')">${post.pinned ? '✕ 取消精选' : '★ 设为精选'}</button></div>` : ""}
            </div>
          `).join("") + `</div>` +
          (all.length === 0 ? '<div class="loading">没有符合条件的文章</div>' : '');
        container.innerHTML = info + gridHTML;
        setTimeout(observeReveal, 30);
        return;
      }

      // 默认列表模式
      // 默认视图下（无筛选/搜索）顺序：1.最新(3天内更新) → 2.精选(置顶) → 3.其他(按时间)，组间加分隔线
      const isDefaultView = !currentSearch && !currentFilter.category && !currentFilter.tag && !currentFilter.featured;
      const featuredPosts = isDefaultView ? all.filter(p => p.pinned) : [];
      const latestPosts = isDefaultView ? all.filter(p => !p.pinned && isRecentlyUpdated(p, 3)) : [];
      const regularPosts = isDefaultView ? all.filter(p => !p.pinned && !isRecentlyUpdated(p, 3)) : all;

      let listHTML = "";
      // 统一卡片渲染：★精选 / ●最新 徽标按文章状态自动判定
      const buildCard = (post, i, base) => `
        <div class="post-card reveal" style="transition-delay:${Math.min((base + i) * 0.05, 0.3)}s" onclick="navigate('post','${post.slug}')">
          <div class="post-meta">
            <time>${formatDate(post.date)}</time><span>·</span>
            ${post.category ? `<span>${post.category}</span><span>·</span>` : ""}
            <span>${post.tags.length} 个标签</span>
            ${post.pinned ? `<span class="pin-badge">★ 精选</span>` : ""}
            ${!post.pinned && isRecentlyUpdated(post, 3) ? `<span class="latest-badge">● 最新</span>` : ""}
            ${isAdmin && post.draft ? `<span class="draft-badge">草稿</span>` : ""}
            ${isAdmin ? `<button class="post-edit-btn" onclick="event.stopPropagation();openEditor('${post.slug}')">编辑</button><button class="post-edit-btn post-delete-btn" onclick="event.stopPropagation();deletePost('${post.slug}')">删除</button><button class="post-edit-btn" onclick="event.stopPropagation();toggleFeatured('${post.slug}')">${post.pinned ? '✕ 取消精选' : '★ 设为精选'}</button>` : ""}
          </div>
          <h3>${highlight(post.title, currentSearch)}</h3>
          ${getImageCount(post.content) > 0 ? `<div class="img-badge">含 ${getImageCount(post.content)} 张图片</div>` : ""}
          <p class="excerpt">${displayExcerpt(post)}</p>
          <div class="post-tags">
            ${post.tags.map(t => `<span class="post-tag" onclick="event.stopPropagation();currentFilter.tag='${t}';filterOpen=true;navigate('home');">#${t}</span>`).join("")}
          </div>
          ${post.series && post.series.length ? `<div class="post-series">${post.series.map(s => `<span class="post-tag series-tag" onclick="event.stopPropagation();navigateSeries('${String(s).replace(/'/g, "\\'")}')">${s}</span>`).join(" ")}</div>` : ""}
        </div>`;
      // 默认视图顺序：1.最新(3天内更新) → 2.精选(置顶) → 3.其他(按时间)
      let offset = 0;
      if (latestPosts.length) {
        listHTML += latestPosts.map((post, i) => buildCard(post, i, offset)).join("");
        offset += latestPosts.length;
        if (featuredPosts.length || regularPosts.length) listHTML += `<div class="divider"><span>· · ·</span></div>`;
      }
      if (featuredPosts.length) {
        listHTML += featuredPosts.map((post, i) => buildCard(post, i, offset)).join("");
        offset += featuredPosts.length;
        if (regularPosts.length) listHTML += `<div class="divider"><span>· · ·</span></div>`;
      }
      listHTML += regularPosts.map((post, i) => buildCard(post, i, offset)).join("");
      container.innerHTML = info + listHTML + (all.length === 0 ? '<div class="loading">没有符合条件的文章</div>' : '');

      setTimeout(observeReveal, 30);
    }

    function renderPost(slug) {
      // 清理上篇文章可能残留的滚动监听
      if (_postScrollHandler) { window.removeEventListener("scroll", _postScrollHandler); _postScrollHandler = null; }
      const app = document.getElementById("app");

      Backend.trackView(slug);
      const views = getViews(slug);

      // 未配置则占位提示（不再使用本地 localStorage 单机评论）。

        commentBlock = `
          <div class="comment-section">
            <div style="color:var(--fg-light);font-size:14px;padding:14px 0;text-align:center;">
              评论系统配置中，敬请期待 ✍️<br><span style="font-size:12px;">（管理员可在「设置 → 评论后端」填入 Twikoo 环境 ID 启用）</span>
            </div>
          </div>`;
      }

      app.innerHTML = `
        <div class="post-detail page-enter">
          <span class="back-link" onclick="goBack()">← 返回</span>
          ${isAdmin ? `<div style="margin:8px 0;"><button class="post-edit-btn" onclick="openEditor('${post.slug}')">编辑</button><button class="post-edit-btn post-delete-btn" onclick="deletePost('${post.slug}')">删除</button></div>` : ""}
          <h1>${post.title}</h1>
          <div class="post-meta">
            <time>${formatDate(post.date)}</time>
            ${post.updatedAt ? `<span style="color:var(--fg-light);font-size:13px;">（修改于 ${formatDate(post.updatedAt)}）</span>` : ""}
            <span>·</span>
            <span style="color:var(--fg-light);font-size:13px;" class="view-count">${views} 次阅读</span>
            <span>·</span>
            <div class="post-tags">
              ${post.category ? `<span class="post-tag" style="background:var(--accent);color:#fff;" onclick="navigate('category','${encodeURIComponent(post.category)}')">${post.category}</span>` : ""}
              ${post.tags.map(t => `<span class="post-tag" onclick="navigate('tag','${t}')">#${t}</span>`).join("")}
            </div>
          </div>
          <div class="post-meta-sub">
            ${post.pinned ? `<span class="pin-badge">★ 精选</span>` : ""}
            ${post.draft ? `<span class="draft-badge">草稿</span>` : ""}
            <span class="reading-time-inline">约 ${readingTime(post.content)} 分钟读完</span>
            ${post.series && post.series.length ? `<span class="series-line">系列：${post.series.map(s => `<span class="post-tag series-tag" onclick="navigateSeries('${String(s).replace(/'/g, "\\'")}')">${s}</span>`).join(" ")}</span>` : ""}

    // 拉取云端留言（Twikoo COMMENT_GET）—— 纯云端，无本地兜底
    async function fetchGuestbookCloud() {
      const onePage = async (offset) => {
        try {
          const res = await fetch(TWIKOO_CONFIG.envId, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ event: "COMMENT_GET", url: GUESTBOOK_PATH, limit: 200, offset })
          });
          if (!res.ok) {
            let errText = "";
            try { errText = await res.text(); } catch(_) {}
            console.warn("[留言板] HTTP", res.status, errText.slice(0, 200));
            return null;
          }
          const json = await res.json();
          const result = json && json.result;
          const data = result && Array.isArray(result.data) ? result.data : [];
          const more = !!(result && result.more);
          return { data, more };
        } catch (err) {
          console.warn("[留言板] 请求异常:", err.message);
          return null;
        }
      };
      try {
        const seen = new Set();
        let all = [], off = 0;
        for (let i = 0; i < 3; i++) {
          const page = await onePage(off);
          if (!page) return all.length ? all : null;
          page.data.forEach(c => { const k = c.id || c._id; if (k && !seen.has(k)) { seen.add(k); all.push(c); } });
          if (!page.more || page.data.length === 0) break;
          off += page.data.length;
        }
        return all;
      } catch (e) { console.warn("[留言板] 分页加载异常:", e.message); return null; }
    }

          body: JSON.stringify({
            event: "COMMENT_SUBMIT",
            accessToken: null,
            nick: name || "匿名访客",
            mail: "",
            link: "",
            ua: navigator.userAgent,
            url: GUESTBOOK_PATH,
            href: location.href,
            comment: html,
            pid: "",
            rid: ""
          })
        });
        return res.ok;
      } catch (e) { return false; }
    }

    function renameTagPrompt(oldTag) {
      const newName = prompt("将标签重命名为：", oldTag);
      if (!newName || newName === oldTag) return;
      getAllPosts().forEach(post => {
        let changed = false;
        // 重命名 tags 数组中的标签
        post.tags = post.tags.map(t => { if (t === oldTag) { changed = true; return newName; } return t; });
        // 重命名 category
        if (post.category === oldTag) { post.category = newName; changed = true; }
        if (changed) savePost(post);
      });
      alert("标签已重命名");
      renderTagManage();
    }

    function deleteTagConfirm(tag) {
      if (!confirm(`确定删除标签 "${tag}" 吗？\n这会从所有文章中移除该标签。`)) return;
      getAllPosts().forEach(post => {
        let changed = false;
        const before = post.tags.length;
        post.tags = post.tags.filter(t => t !== tag);
        if (post.tags.length !== before) changed = true;
        if (post.category === tag) { post.category = null; changed = true; }
        if (changed) savePost(post);
      });
      alert("标签已删除");
      renderTagManage();

    function tlToggleMonth(m) {

    // ===== 导航栏金句（特别日应景）=====
    let currentNavQuoteSlug = "";
    let currentNavQuoteText = "";
    let currentPlaylist = [];   // 当前轮播列表（应景句排前，播完接普通句）
    let currentTagCount = 0;     // 前 N 条为应景（显示标签）
    let currentPos = 0;          // 当前轮播位置
    // 标签词库：标签 -> 触发关键词，构成「金句 × 特别日」的关联数据库
    const QUOTE_TAGS = {
      "雨": ["雨","落雨","阴雨","檐","淋","潮湿","雨珠","下雨","雨幕"],
      "雪": ["雪","落雪","飞雪","冰沙","霜"],
      "雾": ["雾","朦胧","迷蒙","烟"],
      "风": ["风","清风","风掠","风从","风一样"],
      "月": ["月","月娘","月光","月色"],
      "春": ["春","花开","花簇","花好","春风","花香"],
      "夏": ["夏","暑","蝉"],
      "秋": ["秋","落叶","枫","暗下来"],
      "冬": ["冬","寒","冷","冰"],
      "夜": ["夜","夜晚","夜里","入夜"],
      "水": ["湖","水","河","溪","潺潺","波纹"],
      "火": ["火","烧","雷"],
      "花": ["花"],
      "离别": ["别","散","走","告别","离去"],
      "思念": ["念","忆","乡愁","想","悠悠"],
      "清明": ["清明","祭","墓","寒食","扫墓","扫"]
    };
    function getSeasonTag() {
      const m = new Date().getMonth() + 1;
      if (m >= 3 && m <= 5) return "春";
      if (m >= 6 && m <= 8) return "夏";
      if (m >= 9 && m <= 11) return "秋";
      return "冬";
    }
    // 特别日（节气/节日）标签，按当前日期判定，可扩展
    function getFestivalTag() {
      const d = new Date();
      const m = d.getMonth() + 1, day = d.getDate();
      if (m === 4 && day >= 4 && day <= 6) return "清明";
      return null;
    }
    // 当前生效的特别日标签：天气优先，其次节日，其次季节
    function getActiveTags() {
      const tags = [];
      const w = window.__weatherMode;
      if (w === "rain") tags.push("雨");
      else if (w === "snow") tags.push("雪");
      else if (w === "fog") tags.push("雾");
      const f = getFestivalTag();
      if (f) tags.push(f);
      tags.push(getSeasonTag());
      return tags;
    }
    function quoteHitScore(q, tags) {
      let s = 0;
      for (const t of tags) {
        const kws = QUOTE_TAGS[t] || [];
        if (kws.some(k => q.text.includes(k))) s++;
      }
      return s;
    }
    // 当前应景标签（用于徽章显示的核心词，如「雨」「雪」「清明」）
    function activeDisplayTag() {
      const tags = getActiveTags();
      for (const t of tags) {
        const kws = QUOTE_TAGS[t] || [];
        if (kws.length && USER_QUOTES.some(q => kws.some(k => q.text.includes(k)))) return t;
      }
      return null;
    }
    // 播放列表：应景句子排前（带标签），播完自动接普通句子（不带标签），循环轮播
    function rebuildPlaylist() {
      const tags = getActiveTags();
      const matched = USER_QUOTES
        .map(q => ({ q, score: quoteHitScore(q, tags) }))
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score)
        .map(x => x.q);
      const rest = USER_QUOTES.filter(q => !matched.includes(q));
      if (matched.length) {
        currentPlaylist = matched.concat(rest);
        currentTagCount = matched.length;
      } else {
        currentPlaylist = USER_QUOTES.slice();
        currentTagCount = 0;
      }
      currentPos = 0;
    }
    function getNavDailyIndex(n) {
      const today = new Date();
      const dayIndex = Math.floor(today.getTime() / (1000 * 60 * 60 * 24));
      return ((dayIndex % n) + n) % n;
    }
    function setNavQuote(q, tag) {
      const textEl = document.getElementById("nq-text");
      const srcEl = document.getElementById("nq-src");
      const tagEl = document.getElementById("nq-tag");
      if (!textEl) return;
      currentNavQuoteSlug = q.slug;
      currentNavQuoteText = q.text;
      if (tagEl) {
        if (tag) { tagEl.textContent = tag; tagEl.style.display = ""; }
        else { tagEl.style.display = "none"; }
      }
      textEl.style.opacity = "0";
      setTimeout(() => {
        textEl.textContent = q.text;
        srcEl.textContent = "— 《" + q.title + "》" + q.date;
        textEl.style.opacity = "1";
      }, 200);
    }
    // 显示播放列表中第 pos 条；前 currentTagCount 条带标签，其余不带
    function showAt(pos) {
      const q = currentPlaylist[pos];
      const tag = pos < currentTagCount ? activeDisplayTag() : null;
      setNavQuote(q, tag);
    }
    function renderNavQuote() {
      if (!USER_QUOTES.length) return;
      rebuildPlaylist();
      // 特别日：从第一条应景句开始（带标签）；平常日：按当日序号取一句
      currentPos = currentTagCount > 0 ? 0 : getNavDailyIndex(currentPlaylist.length);
      showAt(currentPos);
    }
    function randomizeNavQuote() {
      if (!USER_QUOTES.length) return;
      if (!currentPlaylist.length) rebuildPlaylist();
      currentPos = (currentPos + 1) % currentPlaylist.length;
      showAt(currentPos);
    }

    // ===== 滚动渐入动画 =====
    function observeReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: "0px 0px -40px 0px" });

      document.querySelectorAll(".reveal:not(.visible)").forEach(el => observer.observe(el));
    }

    // ===== 夜间模式 =====
    function toggleTheme() {
      document.body.classList.toggle("dark");
      const isDark = document.body.classList.contains("dark");
      localStorage.setItem("theme", isDark ? "dark" : "light");
      document.getElementById("theme-btn").textContent = isDark ? "●" : "○";
      if (typeof Weather !== "undefined") Weather.syncToTheme();
    }

    // 设置页天气测试按钮：手动覆盖真实天气；"auto" 恢复跟随
    function setWeatherManual(m) {
      if (m === "auto") { localStorage.removeItem("weather-manual"); if (typeof Weather !== "undefined") Weather.syncToTheme(); return; }
      localStorage.setItem("weather-manual", m);
      if (typeof Weather !== "undefined") Weather.setMode(m, "测试 · " + ({ off:"关", rain:"雨", snow:"雪", fog:"雾", stars:"星空", sun:"晴", cloud:"多云" })[m] || m);
    }

    // 天气状态药丸点击切换：开↔关（关时记住之前的模式以便恢复）
    let weatherBeforeOff = null;  // 关闭前记录的模式
    function toggleWeather() {
      const root = document.getElementById("weather-root");
      if (!root) return;
      const isOff = root.classList.contains("weather-off") || localStorage.getItem("weather-manual") === "off";
      if (isOff) {
        // 恢复：清除"off"，回到之前模式或自动
        localStorage.removeItem("weather-manual");
        weatherBeforeOff = null;
        if (typeof Weather !== "undefined") Weather.syncToTheme();
      } else {
        // 关闭：记录当前模式，设为 off
        weatherBeforeOff = typeof Weather !== "undefined" ? window.__weatherMode || null : null;
        localStorage.setItem("weather-manual", "off");
        if (typeof Weather !== "undefined") Weather.setMode("off", "天气动效 · 已关闭");
      }
    }

    // ===== Header 滚动效果 =====
    window.addEventListener("scroll", () => {
      const header = document.getElementById("header");
      if (window.scrollY > 10) header.classList.add("scrolled");
      else header.classList.remove("scrolled");

    // ===== 悬浮美句系统 =====
    const QUOTES = [
      "优柔的韵律滑在书脊之间，也波动着我为文字轻轻颤抖的心",
      "湖的另一侧轰然落着水瀑，激溅的飞浪引发湖面的脉动",

    function initFloatingQuotes() {
      const container = document.getElementById('floating-quotes');
      if (!container) return;

      // 槽位制：把宽度 4%-96% 分成 14 个槽，每个槽同时只放一条，保证不重叠
      const NUM_SLOTS = 14;
      const COVERAGE_START = 4;
      const COVERAGE_END = 96;
      const slotWidth = (COVERAGE_END - COVERAGE_START) / NUM_SLOTS;
      const occupiedSlots = new Map(); // slotIndex -> record
      let quoteIndex = 0;

      function spawnQuote() {
        // 找空闲槽位
        const available = [];
        for (let i = 0; i < NUM_SLOTS; i++) {
          if (!occupiedSlots.has(i)) available.push(i);
        }
        if (available.length === 0) return;

        const slot = available[Math.floor(Math.random() * available.length)];

        // 选句子，太长的截断
        let quote = QUOTES[quoteIndex % QUOTES.length];
        quoteIndex++;
        if (quote.length > 24) quote = quote.substring(0, 24) + '…';

        const el = document.createElement('div');
        el.className = 'float-quote';
        el.textContent = quote;

        // 在槽位内随机偏移
        const x = COVERAGE_START + slot * slotWidth + Math.random() * (slotWidth - 2);
        // 首页时避开标题和诗词区域（顶部约40%），其他页面正常分布
        const isHome = !window.location.hash || window.location.hash === '#' || window.location.hash.startsWith('#/page/');
        const y = isHome ? (Math.random() * 35 + 40) : (Math.random() * 50 + 8); // 首页40%-75%，其他8%-58%
        el.style.left = x + '%';
        el.style.top = y + '%';

        const size = 17 + Math.random() * 8;
        el.style.fontSize = size + 'px';

        // 轻微漂移
        const driftX = (Math.random() - 0.5) * 12;
        const driftY = -(8 + Math.random() * 16);

        const fadeTime = 0.5 + Math.random() * 0.5;
        const visibleTime = 4500 + Math.random() * 3000; // 4.5-7.5秒

        container.appendChild(el);
        const record = { el, slot };
        occupiedSlots.set(slot, record);

        // 渐入
        requestAnimationFrame(() => {
          el.style.transition = `opacity ${fadeTime}s ease, transform ${(visibleTime / 1000 + fadeTime)}s linear`;
          el.classList.add('show');
          el.style.transform = `translate(${driftX}px, ${driftY}px)`;
        });

        // 渐出并释放槽位
        setTimeout(() => {
          el.classList.remove('show');
          el.style.opacity = '0';
          setTimeout(() => {
            el.remove();
            occupiedSlots.delete(slot);
          }, fadeTime * 1000 + 100);
        }, visibleTime);
      }

      // 初始批量生成，快速铺满
      setTimeout(() => {
        for (let i = 0; i < 6; i++) {
          setTimeout(spawnQuote, i * 350);
        }
        // 之后持续生成
        setInterval(spawnQuote, 1400);
      }, 600);
    }

    // ===== 天气动效（自动跟随真实天气） =====
    const Weather = (function () {

          const n = 3 + Math.floor(Math.random() * 2);

      }

      // ===== 晴/多云电影级绘制工具（仅用细节元素烘托氛围，不画天空）=====
      function drawSun(W, H, time) {
        const sx = W * 0.80, sy = H * 0.16;
        const coreR = Math.max(26, Math.min(W, H) * 0.045);
        // 柔光晕（紧致清晰，非大摊模糊）
        const halo = ctx.createRadialGradient(sx, sy, 0, sx, sy, coreR * 3.4);
        halo.addColorStop(0, "rgba(255,250,235,0.98)");
        halo.addColorStop(0.22, "rgba(255,240,200,0.55)");
        halo.addColorStop(0.6, "rgba(255,232,185,0.14)");
        halo.addColorStop(1, "rgba(255,232,185,0)");
        ctx.fillStyle = halo;
        ctx.beginPath(); ctx.arc(sx, sy, coreR * 3.4, 0, Math.PI * 2); ctx.fill();
        // 日芯
        const core = ctx.createRadialGradient(sx, sy, 0, sx, sy, coreR);
        core.addColorStop(0, "rgba(255,255,250,1)");
        core.addColorStop(0.7, "rgba(255,246,214,0.95)");
        core.addColorStop(1, "rgba(255,236,180,0)");
        ctx.fillStyle = core;
        ctx.beginPath(); ctx.arc(sx, sy, coreR, 0, Math.PI * 2); ctx.fill();
        // 动态太阳光线（柔和放射，缓慢旋转）
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(time * 0.02);
        const rays = 12;
        for (let i = 0; i < rays; i++) {
          ctx.rotate((Math.PI * 2) / rays);
          const rg = ctx.createLinearGradient(0, 0, coreR * 7, 0);
          rg.addColorStop(0, "rgba(255,244,210,0.10)");
          rg.addColorStop(1, "rgba(255,244,210,0)");
          ctx.fillStyle = rg;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(coreR * 7, -coreR * 0.5);
          ctx.lineTo(coreR * 7, coreR * 0.5);
          ctx.closePath(); ctx.fill();
        }
        ctx.restore();
        return { sx, sy };
      }
      function drawLensFlares(W, H, time, sun) {
        const cx = W * 0.5, cy = H * 0.5;
        const dx = cx - sun.sx, dy = cy - sun.sy;
        const drift = Math.sin(time * 0.15) * 0.06;   // 镜头光晕缓慢偏移
        const flares = [
          { k: 0.42, r: 26, a: 0.20, col: "255,242,205" },
          { k: 0.74, r: 30, a: 0.12, col: "255,214,180" }
        ];
        for (const f of flares) {
          const x = sun.sx + dx * (f.k + drift);
          const y = sun.sy + dy * (f.k + drift);
          const g = ctx.createRadialGradient(x, y, 0, x, y, f.r);
          g.addColorStop(0, `rgba(${f.col},${f.a})`);
          g.addColorStop(1, `rgba(${f.col},0)`);
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(x, y, f.r, 0, Math.PI * 2); ctx.fill();
        }
      }
      function drawCirrus(c) {
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.globalAlpha = c.alpha;
        const w = 360 * c.scale, h = 26 * c.scale;
        const g = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
        g.addColorStop(0, "rgba(255,255,255,0)");
        g.addColorStop(0.5, "rgba(255,255,255,0.9)");
        g.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = g;
        for (let k = -1; k <= 1; k++) {       // 几条错位细椭圆 → 羽状卷云
          ctx.save();
          ctx.translate(0, k * 8);
          ctx.scale(1, 0.5);
          ctx.beginPath(); ctx.ellipse(0, 0, w / 2, h, 0, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }
        ctx.restore();
      }
      function drawHeatHaze(W, H, time) {
        const y0 = H * 0.88, bh = H * 0.10;     // 地平线附近热浪微闪（极淡）
        ctx.save();
        ctx.globalAlpha = 0.03 + 0.02 * Math.sin(time * 1.5);
        const g = ctx.createLinearGradient(0, y0, 0, y0 + bh);
        g.addColorStop(0, "rgba(255,240,210,0)");
        g.addColorStop(0.5, "rgba(255,240,210,0.5)");
        g.addColorStop(1, "rgba(255,240,210,0)");
        ctx.fillStyle = g;
        ctx.fillRect(0, y0, W, bh);
        ctx.restore();
      }
      function updateBirds(W, H, dt, time) {
        if (!scene.birds) {                     // 远处偶尔有飞鸟滑翔
          scene.birdTimer -= dt;
          if (scene.birdTimer <= 0) {
            const dir = Math.random() < 0.5 ? 1 : -1;
            scene.birds = {
              x: dir > 0 ? -40 : W + 40,
              y: H * (0.12 + Math.random() * 0.22),
              vx: dir * (40 + Math.random() * 30),
              count: 2 + Math.floor(Math.random() * 3),
              spacing: 16 + Math.random() * 10,
              phase: Math.random() * 10,
              sp: 2 + Math.random() * 2,
              t: 0
            };
          }
          return;
        }
        const b = scene.birds;
        b.t += dt; b.x += b.vx * dt; b.y += Math.sin(b.t * b.sp + b.phase) * 8 * dt * 4;
        if ((b.vx > 0 && b.x > W + 80) || (b.vx < 0 && b.x < -80)) {
          scene.birds = null; scene.birdTimer = 14 + Math.random() * 16; return;
        }
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.strokeStyle = "rgba(40,46,60,0.8)";
        ctx.lineWidth = 1.6;
        for (let i = 0; i < b.count; i++) {
          const bx = b.x - i * b.spacing * Math.sign(b.vx);

          const flap = Math.sin(b.t * 8 + i) * 4;

          ctx.moveTo(bx - 7, by + flap);
          ctx.quadraticCurveTo(bx, by - 5, bx + 7, by + flap);
          ctx.stroke();
        }
        ctx.restore();
      }
      function makeCumulus(W, H, i, n) {
        // 多云：可见的白云，几团错落浮在页面顶端（恢复此前的云感，但每团由多个中等云瓣拼成，不再有单一大团块）
        const baseY = H * (0.03 + 0.13 * (n > 1 ? i / (n - 1) : 0.4));
        const puffs = [];
        const np = 3 + Math.floor(Math.random() * 2);          // 每团 3–4 个云瓣，排开成云形
        const ox = (Math.random() - 0.5) * 70;

          puffs.push({
            dx: ox + (b - (np - 1) / 2) * (44 + Math.random() * 26),
            dy: (Math.random() - 0.5) * 22 - 4,
            r: 34 + Math.random() * 30,                    // 中等大小（34–64），不堆成巨团
            a: 0.55 + Math.random() * 0.28,                 // 可见的云（不再是几乎看不见的薄雾）
            ph: Math.random() * Math.PI * 2,
            sw: 0.05 + Math.random() * 0.10

        }
        return {
          x: W * (0.10 + 0.80 * (n > 1 ? i / (n - 1) : Math.random())), y: baseY,
          scale: 0.55 + Math.random() * 0.40,               // 整体适中（0.55–0.95），不再缩成雾
          speed: 6 + Math.random() * 8,
          puffs,
          alpha: 0.62 + Math.random() * 0.22                    // 云整体可见度
        };
      }
      function drawCumulus(c, time, sy) {
        ctx.save();
        ctx.translate(c.x, sy);
        ctx.scale(c.scale, c.scale * 0.62);          // 略压扁：是云形而非球
        // 柔光体积：上缘亮白、下缘淡影，多段渐变模拟云朵（不画成实心大块）
        for (const p of c.puffs) {
          const breathe = 1 + 0.05 * Math.sin(time * p.sw + p.ph);
          const r = p.r * breathe;
          const g = ctx.createRadialGradient(p.dx, p.dy - r * 0.22, r * 0.1, p.dx, p.dy, r);
          g.addColorStop(0,    `rgba(255,255,255,${p.a})`);
          g.addColorStop(0.55, `rgba(240,245,250,${p.a * 0.85})`);
          g.addColorStop(1,    `rgba(214,224,238,0)`);
          ctx.globalAlpha = 1;
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(p.dx, p.dy, r, 0, Math.PI * 2); ctx.fill();
        }
        // 一层极淡底边阴影，制造「云有厚度」的错觉（不是大黑块）
        ctx.globalAlpha = 0.10;
        ctx.fillStyle = "rgba(150,165,190,1)";
        for (const p of c.puffs) {
          const r = p.r * (1 + 0.05 * Math.sin(time * p.sw + p.ph));
          ctx.beginPath(); ctx.ellipse(p.dx, p.dy + r * 0.42, r * 0.92, r * 0.30, 0, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
      }
      function frame(ts) {
        const now = ts || performance.now();
        const dt = Math.min(0.05, (now - (frame._last || now)) / 1000);
        frame._last = now;
        const W = window.innerWidth, H = window.innerHeight;
        ctx.clearRect(0, 0, W, H);
        if (mode === "rain") {
          ctx.strokeStyle = isDark() ? "rgba(200,216,240,1)" : "rgba(108,128,160,1)";
          ctx.lineWidth = 0.6;                      // 毫毛细
          ctx.lineCap = "round";
          for (const p of particles) {
            ctx.globalAlpha = p.o;
            const m = Math.hypot(p.vx, p.speed) || 1;
            const ux = p.vx / m, uy = p.speed / m;   // 雨丝方向与飘动方向一致
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x + ux * p.len, p.y + uy * p.len);
            ctx.stroke();
            p.y += p.speed; p.x += p.vx;
            if (p.y > H) { p.y = -p.len; p.x = Math.random() * W; }
            else if (p.x < -p.len) p.x = W + p.len;
            else if (p.x > W + p.len) p.x = -p.len;

        } else if (mode === "snow") {
          for (const s of particles) {
            s.sway += s.swSp; s.y += s.vy; s.x += Math.sin(s.sway) * s.swAmp;
            if (s.y > H + 6) { s.y = -6; s.x = Math.random() * W; }
            if (s.x < -6) s.x = W + 6; else if (s.x > W + 6) s.x = -6;

        } else if (mode === "fog") {

            if (f.x > W + f.r) f.x = -f.r; else if (f.x < -f.r) f.x = W + f.r;
            const col = isDark() ? "205,215,235" : "255,255,255";
            const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
            g.addColorStop(0, `rgba(${col},${f.o})`);
            g.addColorStop(1, `rgba(${col},0)`);
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.fill();
          }
        } else if (mode === "stars") {
          for (const s of particles) {
            s.ph += 0.02 * s.sp;
