          ctx.globalAlpha = 1;
        } else if (mode === "sun") {
          const time = now / 1000;
          const sun = drawSun(W, H, time);
          drawLensFlares(W, H, time, sun);
          for (const c of scene.clouds) {
            c.x += c.speed * dt;
            if (c.x - 260 > W) c.x = -260;
            drawCirrus(c);
          }
          drawHeatHaze(W, H, time);
          updateBirds(W, H, dt, time);
          for (const p of particles) {
            p.sway += p.swSp;
            p.y += p.vy;
            p.x += Math.sin(p.sway) * 0.3;
            if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
            ctx.globalAlpha = p.o;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,240,190,1)";
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        } else if (mode === "cloud") {
          const time = now / 1000;
          const scrollY = window.scrollY || window.pageYOffset || 0;
          for (const c of scene.clouds) {
            c.x += c.speed * dt;
            if (c.x - 320 * c.scale > W) c.x = -320 * c.scale;
            const sy = c.y - scrollY;                 // 锚定页面顶端，下滚随页面滚走
            if (sy + 320 * c.scale < 0 || sy - 320 * c.scale > H) continue;
            drawCumulus(c, time, sy);
          }
          ctx.globalAlpha = 1;
        }
        raf = requestAnimationFrame(frame);
      }

      function stop() {
        if (raf) cancelAnimationFrame(raf);
        raf = null;
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }

      function setMode(m, label) {
        mode = m;
        root.className = "weather-" + m;
        stop();
        if (["rain","stars","sun","snow","fog","cloud"].includes(m)) {
          resize(); buildParticles(); frame();
        }
        const dot = statusEl.querySelector(".ws-dot");
        const info = {
          off:   ["#bbb", "天气动效关"],
          rain:  ["#6b8cae", "当下 · 雨"],
          snow:  ["#dfe7f5", "当下 · 雪"],
          fog:   ["#cfd6e0", "当下 · 雾"],
          stars: ["#9fb4ff", "当下 · 星空"],
          sun:   ["#f6c453", "当下 · 晴"],
          cloud: ["#cfe0f2", "当下 · 多云"]
        }[m] || ["#bbb", "天气动效关"];
        if (dot) dot.style.background = info[0];
        if (statusText) statusText.textContent = label || info[1];
        statusEl.classList.add("show");
        window.__weatherMode = m;   // 供金句栏判断特别日（雨/雪/雾）
        if (typeof renderNavQuote === "function") renderNavQuote();
      }

      function setStatus(t) { if (statusText) statusText.textContent = t; }

      // WMO weather_code → 中文天气描述
      function weatherLabel(code, isDay) {
        if (code === 0) return isDay ? "晴" : "晴朗夜";
        if (code <= 2) return isDay ? "晴间多云" : "少云夜";
        if (code === 3) return "多云";
        if (code === 45 || code === 48) return "雾";
        if (code >= 51 && code <= 57) return "毛毛雨";
        if (code >= 61 && code <= 67) return "雨";
        if (code >= 80 && code <= 82) return "阵雨";
        if (code >= 71 && code <= 77) return "雪";
        if (code >= 85 && code <= 86) return "阵雪";
        if (code >= 95) return "雷阵雨";
        return "未知";
      }
      // 基础模式：只由真实天气决定，不区分昼夜
      function weatherMode(code) {
        if (code === 0) return "sun";                             // 晴 → 晴天电影感
        if (code <= 3) return "cloud";                            // 少云/多云/阴 → 体积云动效
        if (code === 45 || code === 48) return "fog";             // 雾 → 雾气动效
        if ([71,73,75,77,85,86].includes(code)) return "snow";    // 雪 → 飘雪动效
        return "rain";                                            // 其余（雨/阵雨/毛毛雨/雷阵雨）均为雨幕
      }
      // 显示模式：雨/雪/雾 优先级最高（日夜间都按真实天气走）；晴/多云：夜间星空，日间对应动效
      function resolveMode(base) {
        if (base === "rain" || base === "snow" || base === "fog") return base;
        return isDark() ? "stars" : base;
      }

      // 真实天气：每次访问请求定位授权 → open-meteo（免费、无需 key、支持 CORS）
      function autoWeather() {
        setStatus("正在获取天气…");
        if (!navigator.geolocation) { setMode("off", "浏览器不支持定位"); return; }
        navigator.geolocation.getCurrentPosition(
          pos => {
            const { latitude, longitude } = pos.coords;
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=weather_code,is_day`)
              .then(r => r.json())
              .then(d => {
                const code = d?.current?.weather_code ?? 0;
                const isDay = d?.current?.is_day !== 0;
                const base = weatherMode(code);
                lastBase = base;
                setMode(resolveMode(base), "当下 · " + weatherLabel(code, isDay));
              })
              .catch(() => { lastBase = "rain"; setMode("rain", "天气获取失败 · 默认雨"); });
          },
          () => setMode("off", "未授权定位 · 已关闭动效"),
          { timeout: 9000, maximumAge: 600000 }
        );
      }

      function manualLabel(m) {
        return ({ off:"关", rain:"雨", snow:"雪", fog:"雾", stars:"星空", sun:"晴" })[m] || m;
      }

      // 夜间模式自动开星空；手动覆盖优先
      function syncToTheme() {
        if (localStorage.getItem("weather-manual")) return;  // 仍保持「关」状态，不恢复
        if (mode === "off") {
          // 动效曾被关掉、现由药丸切回「开」：按最近一次真实天气 / 主题恢复
          if (lastBase && lastBase !== "sun") {
            const lab = { rain: "雨", snow: "雪", fog: "雾" }[lastBase];
            setMode(resolveMode(lastBase), "当下 · " + lab);
          } else if (document.body.classList.contains("dark")) {
            setMode("stars", "夜间模式 · 星空");
          } else {
            autoWeather();
          }
          return;
        }
        if (lastBase && lastBase !== "sun") return;   // 雨/雪/雾 不受主题影响，保持当前
        if (document.body.classList.contains("dark")) setMode("stars", "夜间模式 · 星空");
        else autoWeather();
      }

      function init() {
        resize();
        window.addEventListener("resize", () => {
          if (["rain","stars","sun","snow","fog","cloud"].includes(mode)) { resize(); buildParticles(); }
        });
        const manual = localStorage.getItem("weather-manual");
        if (manual) {
          setMode(manual, "测试 · " + manualLabel(manual));
          return;
        }
        // 夜间先给星空占位，再拉真实天气；真实是雨/雪/雾时会自动覆盖为对应动效
        if (document.body.classList.contains("dark")) setMode("stars", "夜间模式 · 星空");
        autoWeather();
      }

      return { init, setMode, auto: autoWeather, syncToTheme };
    })();

    // ===== 初始化 =====
    window.addEventListener("hashchange", handleRoute);

    function boot() {
      try {
        // 配置已加载的库（defer 脚本可能此时已就绪）
        if (typeof marked !== "undefined") marked.setOptions({ breaks: false, gfm: true });
        // 恢复主题
        if (localStorage.getItem("theme") === "dark") {
          document.body.classList.add("dark");
          const tb = document.getElementById("theme-btn");
          if (tb) tb.textContent = "●";
        }
        incrementTraffic();
        updateAdminUI();
        handleRoute();
        initFloatingQuotes();
        renderNavQuote();
        if (window.Weather) Weather.init();
      } catch (e) {
        console.error("初始化出错：", e);
        try { handleRoute(); } catch (_) {}
      }
      // 启动即预拉取 GitHub Issues（文章跨设备），不阻塞首屏
      if (GH_CMS.enabled) {
        // 安全兜底：最多等 5 秒，超时也渲染（用本地数据），避免 GitHub 慢/挂时列表一直空白
        const syncTimeout = setTimeout(() => {
          if (!ghReady) { ghReady = true; if (!document.getElementById("modal-overlay").classList.contains("open")) handleRoute(); }
        }, 5000);
        fetchPostsFromGitHub().then(list => {
          clearTimeout(syncTimeout);
          ghReady = true;
          GH_POSTS = list || [];
          if (!document.getElementById("modal-overlay").classList.contains("open")) handleRoute();
        }).catch(() => {
          clearTimeout(syncTimeout);
          ghReady = true;
          if (!document.getElementById("modal-overlay").classList.contains("open")) handleRoute();
        });
      }
    }

    // 首屏渲染：主脚本解析完毕立即触发（不等外部 CDN / 不等 DOMContentLoaded）
    // 用 requestAnimationFrame 确保 DOM 已构建；再用 setTimeout(0) 兜底
    if (document.readyState === "loading") {
      // 仍在解析中（正常情况）：用 rAF 确保下一个渲染帧执行
      window.requestAnimationFrame ? requestAnimationFrame(boot) : setTimeout(boot, 0);
    } else {
      boot();
    }
    // 终极兜底：window.load 时若还在 loading 态，强制重渲染
    window.addEventListener("load", () => {
      const app = document.getElementById("app");
      if (app && app.querySelector(".loading") && app.children.length <= 1) {
        try { handleRoute(); } catch (e) { console.error("force render:", e); }
      }
    });
  </script>
</body>
</html>
