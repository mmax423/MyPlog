  <h1>呼号</h1>
  <div class="pbody"><p>化身</p>
<p>雨来，浇灭狂乱的火，</p>
<p>我们不是仇敌。</p>
<p>要将火埋作温人的灯。</p>
<p>雷霆冲垮黑夜，</p>
<p>撕开的口子里喘着息，</p>
<p>等一下。</p>
<p>慢一些。</p>
<p>我的胸口沉甸甸。</p>
<p>莫让火花肆虐，</p>
<p>它温暖，强劲，也十足暴烈！</p>
<p>莫要雷霆劈天，</p>
<p>即便闪的白色的光，</p>
<p>即便照彻了苦难人间。</p>
<p>等一下，</p>
<p>慢一些。</p>
<p>时不我待理乱线。</p>
<p>小心点！</p>
<p>小心火烧青天，雷崩地灭了！</p>
<p>你要化身，</p>
<p>身作我，身作他——她——它——</p>
<p>化身来导引雷天，</p>
<p>火光人间！</p>
</div>
